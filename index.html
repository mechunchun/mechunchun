<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小米集团 (01810.HK) 股价走势</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
      padding: 28px 0 22px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
    header p  { font-size: 14px; opacity: 0.85; margin-top: 6px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 40px; }

    /* 数据卡片 */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .card .label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .card .value { font-size: 24px; font-weight: 700; }
    .card .value.red   { color: #e74c3c; }
    .card .value.green { color: #27ae60; }
    .card .sub  { font-size: 12px; color: #aaa; margin-top: 4px; }

    /* 图表区 */
    .chart-box {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 28px;
    }
    .chart-box h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }

    /* 数据表格 */
    .table-box {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      overflow-x: auto;
    }
    .table-box h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #f0f2f5;
      padding: 10px 12px;
      text-align: right;
      font-weight: 600;
      color: #555;
      position: sticky;
      top: 0;
    }
    tbody td { padding: 9px 12px; text-align: right; border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover { background: #fafafa; }
    .up   { color: #e74c3c; font-weight: 600; }
    .down { color: #27ae60; font-weight: 600; }

    /* 页脚 */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #aaa;
    }
    footer a { color: #e74c3c; text-decoration: none; }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      header h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📈 小米集团-W (01810.HK) 股价走势</h1>
  <p>过去一年每日交易数据 · 2025-06-30 ~ 2026-06-29</p>
</header>

<div class="container">

  <!-- 核心数据卡片 -->
  <div class="stats">
    <div class="card">
      <div class="label">最新收盘价</div>
      <div class="value red" id="latestClose">—</div>
      <div class="sub" id="latestDate">—</div>
    </div>
    <div class="card">
      <div class="label">期间最高</div>
      <div class="value red" id="maxClose">—</div>
      <div class="sub" id="maxDate">—</div>
    </div>
    <div class="card">
      <div class="label">期间最低</div>
      <div class="value green" id="minClose">—</div>
      <div class="sub" id="minDate">—</div>
    </div>
    <div class="card">
      <div class="label">涨跌幅</div>
      <div class="value" id="pctChange">—</div>
      <div class="sub">年初 vs 最新</div>
    </div>
    <div class="card">
      <div class="label">平均收盘价</div>
      <div class="value" id="avgClose">—</div>
      <div class="sub">245 个交易日</div>
    </div>
  </div>

  <!-- 曲线图 -->
  <div class="chart-box">
    <h2>📊 收盘价走势图</h2>
    <canvas id="priceChart" height="380"></canvas>
  </div>

  <!-- K线 / 数据表格 -->
  <div class="table-box">
    <h2>📋 近期交易数据</h2>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>开盘</th>
          <th>最高</th>
          <th>最低</th>
          <th>收盘</th>
          <th>涨跌幅</th>
          <th>成交量 (万股)</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<footer>
  数据来源：Tushare Pro &nbsp;|&nbsp;
  <a href="https://github.com/mechunchun/chunchun" target="_blank">GitHub</a>
</footer>

<script>
// ====== 从 CSV 加载数据 ======
// 这里直接内嵌数据，避免跨域问题
const stockData = [

{"trade_date":"20260507","open":28.00,"high":28.30,"low":27.80,"close":28.00,"pct_chg":0.00,"vol":132996.58},

];

// 格式化日期 YYYYMMDD -> YYYY-MM-DD
function fmtDate(s) {
  return s.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
}

// 计算统计
const closes   = stockData.map(d => d.close);
const maxC     = Math.max(...closes);
const minC     = Math.min(...closes);
const maxItem  = stockData.find(d => d.close === maxC);
const minItem  = stockData.find(d => d.close === minC);
const latest   = stockData[0];
const first    = stockData[stockData.length - 1];
const pctChg   = ((latest.close - first.close) / first.close * 100).toFixed(2);
const avgC     = (closes.reduce((a,b)=>a+b,0) / closes.length).toFixed(2);

document.getElementById('latestClose').textContent = 'HK$' + latest.close.toFixed(2);
document.getElementById('latestDate').textContent  = fmtDate(latest.trade_date);
document.getElementById('maxClose').textContent = 'HK$' + maxC.toFixed(2);
document.getElementById('maxDate').textContent  = fmtDate(maxItem.trade_date);
document.getElementById('minClose').textContent = 'HK$' + minC.toFixed(2);
document.getElementById('minDate').textContent  = fmtDate(minItem.trade_date);

const pctEl = document.getElementById('pctChange');
pctEl.textContent = (pctChg >= 0 ? '+' : '') + pctChg + '%';
pctEl.className = 'value ' + (pctChg >= 0 ? 'red' : 'green');

document.getElementById('avgClose').textContent = 'HK$' + avgC;

// ====== Chart.js 曲线图 ======
const labels = stockData.slice().reverse().map(d => fmtDate(d.trade_date));
const closeData = stockData.slice().reverse().map(d => d.close);

const ctx = document.getElementById('priceChart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [{
      label: '收盘价 (港元)',
      data: closeData,
      borderColor: '#e74c3c',
      backgroundColor: 'rgba(231,76,60,0.08)',
      fill: true,
      tension: 0.3,
      pointRadius: 0,
      pointHoverRadius: 5,
      borderWidth: 2
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: true, position: 'top' },
      tooltip: {
        callbacks: {
          label: ctx => ' 收盘价: HK$' + ctx.parsed.y.toFixed(2)
        }
      }
    },
    scales: {
      x: { ticks: { maxTicksLimit: 12 }, grid: { display: false } },
      y: { ticks: { callback: v => 'HK$' + v } }
    }
  }
});

// ====== 数据表格（显示最近 50 条）======
const tbody = document.getElementById('tableBody');
stockData.forEach(d => {
  const tr = document.createElement('tr');
  const cls = d.pct_chg >= 0 ? 'up' : 'down';
  const sign = d.pct_chg >= 0 ? '+' : '';
  tr.innerHTML = `
    <td>${fmtDate(d.trade_date)}</td>
    <td class="${cls}">${d.open.toFixed(2)}</td>
    <td class="${cls}">${d.high.toFixed(2)}</td>
    <td class="${cls}">${d.low.toFixed(2)}</td>
    <td class="${cls}" style="font-weight:700">${d.close.toFixed(2)}</td>
    <td class="${cls}">${sign}${d.pct_chg.toFixed(2)}%</td>
    <td>${d.vol.toLocaleString(undefined, {maximumFractionDigits:0})}</td>`;
  tbody.appendChild(tr);
});
</script>
</body>
</html>
